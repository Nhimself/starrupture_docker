; modloader configuration file
; This file is automatically generated if it doesn't exist
[Logging]
; Log level: TRACE, DEBUG, INFO, WARN, ERROR
; INFO is recommended for production, DEBUG for troubleshooting
Level=INFO
; Enable file logging
EnableFile=1
; Log file name (relative to game exe)
FileName=modloader.log
[UE4SS]
; Load UE4SS before plugins (set to 0 to disable)
Enabled=0
; Path to UE4SS DLL, relative to the game exe
Path=ue4ss\ue4ss.dll
[AutoUpdate]
; Set to 0 to disable automatic plugin updates at startup
Enabled=0
; Override the manifest URL (leave empty to use the compiled-in default)
ManifestUrl=
[UI]
Enabled=0
OpenKey=F2