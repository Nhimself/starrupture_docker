networks:
  monitoring:
    external: true  # shared monitoring network — created by prometheus_grafana/docker-compose.yml

services:
  starrupture:
    build: .
    container_name: starrupture-server
    #restart: unless-stopped
    ports:
      # UDP only — do NOT expose TCP (Remote Control exploit CVE)
      - "${SERVER_PORT:-7777}:${SERVER_PORT:-7777}/udp"
      # RCON (TCP) — bound to localhost only for admin commands
      - "${RCON_PORT:-27015}:${RCON_PORT:-27015}/tcp"
      # A2S Steam Query (UDP) — same port, publicly exposed for server browser
      - "${RCON_PORT:-27015}:${RCON_PORT:-27015}/udp"
    volumes:
      - starrupture-data:/home/steam/serverfiles
      # Modloader DLLs — disabled: modloader v1.4.0 crashes on CL-118629 (WorldBeginPlay hook pattern mismatch).
      # Re-enable once a compatible modloader version is available.
      #- ./modloader/Plugins:/home/steam/serverfiles/StarRupture/Binaries/Win64/Plugins
      #- ./modloader/dwmapi.dll:/home/steam/serverfiles/StarRupture/Binaries/Win64/dwmapi.dll
      #- ./modloader/modloader.ini:/home/steam/serverfiles/StarRupture/Binaries/Win64/modloader.ini
      # Password files are generated at runtime from ADMIN_PASSWORD / PLAYER_PASSWORD in .env
      # Save games — bind-mounted so they survive "docker compose down -v".
      # Place saves under ./Saved/<SessionName>/AutoSave0.sav to match DSSettings.txt.
      - ./Saved:/home/steam/serverfiles/StarRupture/Saved/SaveGames
      # DSSettings.txt — alongside StarRuptureServerEOS.exe at the server root
      - ./DSSettings.txt:/home/steam/serverfiles/DSSettings.txt
      # Directory for seeting the server log files
      - ./Saved/Logs/:/home/steam/serverfiles/StarRupture/Saved/Logs/
      # ModLoader log file
      - ./modloader/modloader.log:/home/steam/serverfiles/StarRupture/Binaries/Win64/modloader.log
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "/home/steam/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    # Stop grace period to allow server to shut down cleanly
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
        #  memory: 25G
          cpus: '2.00'
        reservations:
          memory: 10G
          cpus: '0.50'
    labels:
      - "prometheus.io/scrape=true"
      - "prometheus.io/port=8000"
      - "prometheus.io/path=/metrics"

volumes:
  starrupture-data:
