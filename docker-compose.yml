services:
  starrupture:
    build: .
    container_name: starrupture-server
    restart: unless-stopped
    ports:
      # UDP only — do NOT expose TCP (Remote Control exploit CVE)
      - "${SERVER_PORT:-7777}:${SERVER_PORT:-7777}/udp"
    volumes:
      - starrupture-data:/home/steam/serverfiles
      - ./DSSettings.txt://home/steam/serverfiles/StarRupture/Binaries/Win64/DSSettings.txt
      #- ./AutoSave0.sav:/home/steam/serverfiles/StarRupture/Saved/SaveGames/AutoSave0.sav
      #- ./AutoSave0.met:/home/steam/serverfiles/StarRupture/Saved/SaveGames/AutoSave0.met
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "/home/steam/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    # Stop grace period to allow server to shut down cleanly
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 8G

volumes:
  starrupture-data:
