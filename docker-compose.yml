services:
  starrupture:
    build: .
    container_name: starrupture-server
    restart: unless-stopped
    ports:
      # UDP only — do NOT expose TCP (Remote Control exploit CVE)
      - "${SERVER_PORT:-7777}:${SERVER_PORT:-7777}/udp"
      # RCON — bound to localhost only, never exposed publicly
      - "127.0.0.1:${RCON_PORT:-27015}:${RCON_PORT:-27015}/tcp"
    volumes:
      - starrupture-data:/home/steam/serverfiles
      # Save games are bind-mounted to a local folder so they survive "docker compose down -v"
      # or any accidental volume wipe. Back this folder up externally.
      - ./saves:/home/steam/serverfiles/StarRupture/Saved/SaveGames
      - ./Password.json:/home/steam/serverfiles/StarRupture/Binaries/Win64/Password.json
      - ./PlayerPassword.json:/home/steam/serverfiles/StarRupture/Binaries/Win64/PlayerPassword.json
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "/home/steam/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    # Stop grace period to allow server to shut down cleanly
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 8G

volumes:
  starrupture-data:
