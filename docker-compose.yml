services:
  starrupture:
    build: .
    container_name: starrupture-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-7777}:${SERVER_PORT:-7777}/udp"
      - "${SERVER_PORT:-7777}:${SERVER_PORT:-7777}/tcp"
      - "${QUERY_PORT:-27015}:${QUERY_PORT:-27015}/udp"
      - "${QUERY_PORT:-27015}:${QUERY_PORT:-27015}/tcp"
      #- "30020:30020/tcp"
    volumes:
      - server-data:/home/steam/serverfiles
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "/home/steam/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    # Stop grace period to allow server to shut down cleanly
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 8G

volumes:
  server-data:
